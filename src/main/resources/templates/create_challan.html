form {

	border-radius: 10px;

.form-group {

}

.form-group label {
	display: block;
	font-size: 13px;
	font-weight: 600;
	color: #4a5568;
	margin-bottom: 6px;
}

	width: 100%;
	padding: 9px 12px;
	font-size: 14px;
	border: 1px solid #cbd5e0;
	border-radius: 6px;
	background: white;
	color: #2d3748;
	outline: none;

}

.form-group input:focus, .form-group select:focus {
	border-color: #1a6fa8;
	box-shadow: 0 0 0 3px rgba(26, 111, 168, 0.12);

	color: white;
	border: none;
	border-radius: 6px;
	font-size: 15px;

footer {

			</div>

					<option value="100">100</option>

	<script>
async function loadUsers() {
    const select = document.getElementById('userId');
    try {
        const response = await fetch('/api/challan/users');
        const users = await response.json();
        select.innerHTML = '<option value="">Select user</option>';
        users.forEach(user => {
            const option = document.createElement('option');
            option.value = user.user_id;
            option.textContent = `${user.name} (${user.username || user.email})`;
            select.appendChild(option);
        });
    } catch {
        select.innerHTML = '<option value="">Unable to load users</option>';
    }
}

async function submitForm(event) {
    event.preventDefault();
    const message = document.getElementById('formMessage');
    const payload = {
        userId: Number(document.getElementById('userId').value),
        challanNo: document.getElementById('challanNo').value,
        vehicleNo: document.getElementById('vehicleNo').value,
        violatorName: document.getElementById('violatorName').value,
        challanAmount: Number(document.getElementById('challanAmount').value),
        offenceName: document.getElementById('offenceName').value,
        mvaSection: document.getElementById('mvaSection').value,
        penalty: Number(document.getElementById('penalty').value) || 0,
        state: document.getElementById('state').value,
        city: document.getElementById('city').value,
        areaName: document.getElementById('areaName').value,
        rtoCode: document.getElementById('rtoCode').value,
        courtName: document.getElementById('courtName').value,
        designation: document.getElementById('designation').value,
        vehicleImpound: document.getElementById('vehicleImpound').value
    };
    try {
        const response = await fetch('/api/challan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!response.ok) {
            const error = await response.json();
            message.textContent = error.message || 'Failed to create challan.';
            message.style.color = 'red';
            return;
        }
        const result = await response.json();
        message.textContent = 'Challan created successfully for user ID ' + result.user.user_id + '!';
        message.style.color = 'green';
        document.getElementById('challanForm').reset();
    } catch {
        message.textContent = 'Network error while creating challan.';
        message.style.color = 'red';
    }
}

document.getElementById('challanForm').addEventListener('submit', submitForm);
loadUsers();

function changePanelty() {
    let challanAmount = document.getElementById('challanAmount').value;
    
    document.getElementById('penalty').value = challanAmount;
}
</script>
